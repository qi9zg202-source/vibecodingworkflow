<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Beta 1</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #fbfaf6; color: #2a2a2a; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .summary-block { padding: 18px; border-radius: 12px; background: #fff; border: 1px solid #e2dac7; }
    .summary-block h2 { margin: 0 0 8px; font-size: 18px; }
    .summary-block p { margin: 0; color: #5a5447; }
  </style>
</head>
<body>
  <h1>Mock Beta Summary</h1>
  <div class="grid">
    <section class="summary-block">
      <h2>Region North</h2>
      <p>12 items tracked in this mock summary.</p>
    </section>
    <section class="summary-block">
      <h2>Region South</h2>
      <p>9 items tracked in this mock summary.</p>
    </section>
  </div>
</body>
</html>
