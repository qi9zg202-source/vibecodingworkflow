<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Alpha 1</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      color: #223;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }
    .hero {
      margin-bottom: 24px;
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #d8e0ea;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    .hero p {
      margin: 0;
      color: #556070;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .card {
      padding: 18px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #d8e0ea;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }
    .card p {
      margin: 0;
      color: #556070;
    }
    @media (max-width: 720px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Mock Alpha Landing</h1>
      <p>Simple fixture for dashboard testing with three mock product cards.</p>
    </section>
    <section class="cards" aria-label="Mock product cards">
      <article class="card">
        <h2>Product A</h2>
        <p>Status: Draft</p>
      </article>
      <article class="card">
        <h2>Product B</h2>
        <p>Status: Review</p>
      </article>
      <article class="card">
        <h2>Product C</h2>
        <p>Status: Ready</p>
      </article>
    </section>
  </main>
</body>
</html>
