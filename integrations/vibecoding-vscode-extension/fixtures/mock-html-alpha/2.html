<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Alpha 2</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      color: #223;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding: 16px 18px;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #d8e0ea;
    }
    .toolbar h1 {
      margin: 0;
      font-size: 22px;
    }
    .toolbar span {
      color: #556070;
      font-size: 14px;
    }
    .table-card {
      overflow: hidden;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #d8e0ea;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid #d8e0ea;
      text-align: left;
    }
    th {
      background: #eef4ff;
      font-size: 14px;
    }
    tbody tr:last-child td {
      border-bottom: 0;
    }
    @media (max-width: 720px) {
      .toolbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="toolbar" aria-label="List page toolbar">
      <h1>Mock Alpha List</h1>
      <span>Filter: All</span>
    </section>
    <section class="table-card">
      <table aria-label="Mock list table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Owner</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Product A</td>
            <td>Alice</td>
          </tr>
          <tr>
            <td>Product B</td>
            <td>Bob</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
